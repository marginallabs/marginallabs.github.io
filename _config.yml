title: Marginal Lab
email: marginallab@proton.me
description: >-
  Marginal Lab — A lab exploring economic ideas, and what happens when they meet real life.
baseurl: ""
url: "https://marginallabs.github.io"
logo: /assets/img/favicon.svg
author: Marginal Lab

markdown: kramdown
kramdown:
  math_engine: null
theme: null
future: true
permalink: /blog/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - _pages/about.md
  - _pages/blog.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"

include:
  - _pages
