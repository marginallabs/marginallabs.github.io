<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d5016">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% seo %}
  {% feed_meta %}
  <script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      tags: 'ams'
    },
    chtml: {
      linebreaks: { automatic: true }
    },
    startup: {
      pageReady: function() {
        return MathJax.startup.defaultPageReady().then(function() {
          document.querySelectorAll('mjx-container[display]').forEach(function(c) {
            var wrap = document.createElement('div');
            wrap.className = 'math-scroll';
            c.parentNode.insertBefore(wrap, c);
            wrap.appendChild(c);
          });
        });
      }
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
  (function() {
    var stored = localStorage.getItem('theme');
    if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
</head>
<body>
  <!-- Reading progress bar (posts only, shown via JS) -->
  <div class="progress-bar" id="progress-bar"></div>
  <!-- Desktop header -->
  <header class="site-header" id="desktop-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}"><img class="site-logo" src="{{ '/assets/img/favicon.svg' | relative_url }}" alt="∂">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <button class="theme-toggle" id="theme-toggle-desktop" aria-label="Toggle dark mode">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Mobile hamburger + sidebar -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-title" href="{{ '/' | relative_url }}"><img class="site-logo" src="{{ '/assets/img/favicon.svg' | relative_url }}" alt="∂">{{ site.title }}</a>
    <nav class="sidebar-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
    </nav>
    <div class="sidebar-bottom">
      <button class="theme-toggle sidebar-theme" id="theme-toggle-mobile" aria-label="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a class="sidebar-contact" href="mailto:{{ site.email }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <span>{{ site.email }}</span>
      </a>
    </div>
  </aside>

  <main class="page-content">
    <div class="wrapper">
      {% unless page.url == '/' %}<h2 class="mobile-page-title">Marginal Lab</h2>{% endunless %}
      {{ content }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <div class="footer-contact">
        <a href="mailto:{{ site.email }}"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></a>
      </div>
      <p class="footer-text">&copy; {{ 'now' | date: "%Y" }} Marginal Lab</p>
    </div>
  </footer>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
  (function() {
    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
    document.getElementById('theme-toggle-desktop').addEventListener('click', toggleTheme);
    document.getElementById('theme-toggle-mobile').addEventListener('click', toggleTheme);

    var sidebarToggle = document.getElementById('sidebar-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarToggle.classList.add('open');
      overlay.classList.add('active');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarToggle.classList.remove('open');
      overlay.classList.remove('active');
    }

    sidebarToggle.addEventListener('click', function() {
      if (sidebar.classList.contains('open')) closeSidebar();
      else openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);
  })();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }

  // Scroll fade-in for sections
  (function() {
    var targets = [];
    document.querySelectorAll('.post-content, .page-content .page, .home .recent-posts, .home-hero').forEach(function(container) {
      if (!container) return;
      var child = container.firstElementChild;
      while (child) {
        targets.push(child);
        child = child.nextElementSibling;
      }
    });
    document.querySelectorAll('.home-hero, .blog-list-item').forEach(function(el) {
      targets.push(el);
    });
    targets.forEach(function(el) {
          if (el.matches('h1, h2, h3, .page-title-row, .section-title-row, .lab-icon, .lab-title, .home-hero')) return;
          el.classList.add('fade-in');
        });
    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      targets.forEach(function(el) { observer.observe(el); });
    } else {
      targets.forEach(function(el) { el.classList.add('visible'); });
    }
  })();

  // Reading progress bar (posts only)
  (function() {
    var bar = document.getElementById('progress-bar');
    var post = document.querySelector('.post');
    if (!bar || !post) return;
    window.addEventListener('scroll', function() {
      var rect = post.getBoundingClientRect();
      var total = post.scrollHeight;
      var scrolled = -rect.top + window.innerHeight * 0.3;
      var pct = Math.min(Math.max(scrolled / total * 100, 0), 100);
      bar.style.width = pct + '%';
    }, { passive: true });
  })();

  // Back to top
  (function() {
    var btn = document.getElementById('back-to-top');
    if (!btn) return;
    window.addEventListener('scroll', function() {
      if (window.scrollY > 600) btn.classList.add('visible');
      else btn.classList.remove('visible');
    }, { passive: true });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();

  // Image lightbox
  (function() {
    var overlay = document.getElementById('lightbox');
    var img = document.getElementById('lightbox-img');
    var closeBtn = document.getElementById('lightbox-close');
    if (!overlay) return;
    document.querySelectorAll('.post-content img, .post-content .figure-img').forEach(function(el) {
      el.style.cursor = 'zoom-in';
      el.addEventListener('click', function() {
        img.src = el.src;
        img.alt = el.alt || '';
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });
    function closeLightbox() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    closeBtn.addEventListener('click', closeLightbox);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  })();

  // Copy link button
  (function() {
    var copyBtns = document.querySelectorAll('.share-btn.copy-link');
    copyBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(window.location.href).then(function() {
          var tip = btn.querySelector('.copy-tooltip');
          tip.classList.add('show');
          setTimeout(function() { tip.classList.remove('show'); }, 1500);
        });
      });
    });
  })();

  // Wrap tables in scrollable container
  document.querySelectorAll('.post-content table, .page-content table').forEach(function(t) {
    var wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });
  </script>
</body>
</html>
